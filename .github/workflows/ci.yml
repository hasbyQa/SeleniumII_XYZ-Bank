# CI pipeline for XYZ Bank Selenium II test suite
# Triggers on push/PR to main — runs tests, publishes Allure report

name: Selenium Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (Eclipse Temurin — same as Docker image)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven dependencies — avoids re-downloading ~200MB on every run
      #    Key includes pom.xml hash so cache invalidates when dependencies change
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-


      # 4. Pre-download aspectjweaver (required by Allure as -javaagent)
      - name: Download aspectjweaver
        run: mvn dependency:copy -Dartifact=org.aspectj:aspectjweaver:1.9.22.1 -DoutputDirectory=/tmp -q

      # 5. Run tests — failure.ignore ensures CI gets green checkmark even when
      #    tests fail (known bugs M2/M3/M4). Failures visible in Allure report.
      #    -DargLine gives the forked JVM enough memory to avoid OOM crashes.
      - name: Run tests
        run: mvn clean test -Dmaven.test.failure.ignore=true -DargLine="-Xmx512m -XX:+UseG1GC"

      # 6. Parse test results — extracts counts and skipped/failed test details
      - name: Parse test results
        if: always()
        id: test-results
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

          if ls target/surefire-reports/TEST-*.xml 1>/dev/null 2>&1; then
            TESTS=$(grep -h 'testsuite' target/surefire-reports/TEST-*.xml | \
              awk -F'"' '{for(i=1;i<=NF;i++){if($(i-1)~/ tests=/){t+=$i}if($(i-1)~/ failures=/){f+=$i}if($(i-1)~/ errors=/){e+=$i}if($(i-1)~/ skipped=/){s+=$i}}}END{print t" "f" "e" "s}')
            TOTAL=$(echo $TESTS | awk '{print $1}')
            FAILURES=$(echo $TESTS | awk '{print $2}')
            ERRORS=$(echo $TESTS | awk '{print $3}')
            SKIPPED=$(echo $TESTS | awk '{print $4}')
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))

            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILURES" >> $GITHUB_OUTPUT
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

            if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "status=FAILED" >> $GITHUB_OUTPUT
            else
              echo "status=PASSED" >> $GITHUB_OUTPUT
            fi

            # Extract skipped test names and reasons from surefire XML
            SKIPPED_DETAILS=""
            SKIPPED_SLACK=""
            for xml in target/surefire-reports/TEST-*.xml; do
              while IFS= read -r line; do
                if echo "$line" | grep -q 'skipped message='; then
                  REASON=$(echo "$line" | sed 's/.*message="\([^"]*\)".*/\1/')
                  TESTNAME=$(echo "$prev_line" | sed 's/.*name="\([^"]*\)".*/\1/')
                  SKIPPED_DETAILS="${SKIPPED_DETAILS}<li><b>${TESTNAME}</b><br/>Reason: ${REASON}</li>"
                  SKIPPED_SLACK="${SKIPPED_SLACK}• ${TESTNAME}\n  Reason: ${REASON}\n"
                fi
                prev_line="$line"
              done < "$xml"
            done

            if [ -z "$SKIPPED_DETAILS" ]; then
              SKIPPED_DETAILS="<li>No skipped tests</li>"
              SKIPPED_SLACK="No skipped tests"
            fi

            # Extract failed test names
           FAILED_DETAILS=""
            FAILED_SLACK=""
            if [ -d "target/allure-results" ]; then
              for json in target/allure-results/*-result.json; do
                [ -f "$json" ] || continue
                STATUS=$(jq -r '.status // empty' "$json" 2>/dev/null)
                if [ "$STATUS" = "failed" ]; then
                  NAME=$(jq -r '.name // empty' "$json")
                  DESC=$(jq -r '.description // empty' "$json")
                  MSG=$(jq -r '.statusDetails.message // empty' "$json")

                  # HTML: structure with line breaks between sections
                  DESC_HTML=$(echo "$DESC" | sed 's/</\&lt;/g; s/>/\&gt;/g')
                  MSG_HTML=$(echo "$MSG" | sed 's/</\&lt;/g; s/>/\&gt;/g')
                  DESC_HTML=$(echo "$DESC_HTML" | sed 's/Severity:/<br\/><b>Severity:<\/b>/; s/Expected:/<br\/><b>Expected:<\/b>/; s/Actual:/<br\/><b>Actual:<\/b>/; s/Steps:/<br\/><b>Steps:<\/b>/')
                  DESC_HTML=$(echo "$DESC_HTML" | sed 's/\([0-9])\)/<br\/>\1/g')
                  FAILED_DETAILS="${FAILED_DETAILS}<li><b>${NAME}</b><br/>${DESC_HTML}<br/><br/><i>Result: ${MSG_HTML}</i></li>"

                  # Slack: structured with newlines
                  DESC_CLEAN=$(echo "$DESC" | tr '"' "'" | tr '\n' ' ')
                  BUGID=$(echo "$DESC_CLEAN" | sed -n 's/\(BUG-[0-9]*\).*/\1/p')
                  SEV=$(echo "$DESC_CLEAN" | sed -n 's/.*Severity: \([^ |]*\).*/\1/p')
                  PRI=$(echo "$DESC_CLEAN" | sed -n 's/.*Priority: \([^ |]*\).*/\1/p')
                  EXP=$(echo "$DESC_CLEAN" | sed -n 's/.*Expected: \([^.]*\)\..*/\1/p')
                  ACT=$(echo "$DESC_CLEAN" | sed -n "s/.*Actual: \([^.]*\)\..*/\1/p")
                  STEPS=$(echo "$DESC_CLEAN" | sed -n 's/.*Steps: //p' | head -c 500)
                  FAILED_SLACK="${FAILED_SLACK}• *${NAME}* [${BUGID}]\n  Severity: ${SEV} | Priority: ${PRI}\n  Expected: ${EXP}\n  Actual: ${ACT}\n  Steps: ${STEPS}\n\n"
                fi
              done
            fi

            if [ -z "$FAILED_DETAILS" ]; then
              FAILED_DETAILS="<li>All tests passed!</li>"
              FAILED_SLACK="All tests passed!"
            fi

            # Write to files to avoid GITHUB_OUTPUT escaping issues
            echo "$SKIPPED_DETAILS" > /tmp/skipped_html.txt
            echo "$FAILED_DETAILS" > /tmp/failed_html.txt

            {
              echo "skipped_html<<SKEOF"
              cat /tmp/skipped_html.txt
              echo "SKEOF"
            } >> $GITHUB_OUTPUT

            {
              echo "failed_html<<FHEOF"
              cat /tmp/failed_html.txt
              echo "FHEOF"
            } >> $GITHUB_OUTPUT

            echo "skipped_slack=${SKIPPED_SLACK}" >> $GITHUB_OUTPUT
            echo "failed_slack=${FAILED_SLACK}" >> $GITHUB_OUTPUT

          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "status=NO RESULTS" >> $GITHUB_OUTPUT
            echo "skipped_html=<li>No test results</li>" >> $GITHUB_OUTPUT
            echo "failed_html=<li>No test results</li>" >> $GITHUB_OUTPUT
            echo "skipped_slack=No test results" >> $GITHUB_OUTPUT
            echo "failed_slack=No test results" >> $GITHUB_OUTPUT
          fi

      # 7. Upload Allure results as artifact — preserved for 30 days
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # 8. Upload test screenshots on failure
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 30

      # 9. Generate Allure report using CLI
      - name: Install Allure CLI
        if: always() && github.ref == 'refs/heads/main'
        run: |
          curl -o allure-2.27.0.tgz -Ls https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always() && github.ref == 'refs/heads/main'
        run: allure generate target/allure-results -o allure-report --clean

      # 10. Deploy Allure report to GitHub Pages
      - name: Deploy report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      # 11. Slack notification — matches Lab I format with skipped/failed details
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.test-results.outputs.status == 'PASSED' && '✅ All Tests Passed' || '❌ Tests Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n${{ steps.test-results.outputs.commit_msg }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Total:* ${{ steps.test-results.outputs.total }}" },
                    { "type": "mrkdwn", "text": "*Passed:* ${{ steps.test-results.outputs.passed }}" },
                    { "type": "mrkdwn", "text": "*Failed:* ${{ steps.test-results.outputs.failed }}" },
                    { "type": "mrkdwn", "text": "*Skipped:* ${{ steps.test-results.outputs.skipped }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🐛 Failed Tests:*\n${{ steps.test-results.outputs.failed_slack }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⏭️ Skipped/Disabled Tests:*\n${{ steps.test-results.outputs.skipped_slack }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run Details" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # 12. Email notification — matches Lab I format with test details table
      - name: Notify Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ steps.test-results.outputs.status }} ${{ steps.test-results.outputs.status == 'PASSED' && '✅' || '❌' }} - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: CI Test Bot <${{ secrets.EMAIL_USERNAME }}>
          html_body: |
            <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
              <h1 style="color: ${{ steps.test-results.outputs.status == 'PASSED' && '#28a745' || '#dc3545' }}; text-align: center;">
                ${{ steps.test-results.outputs.status }} ${{ steps.test-results.outputs.status == 'PASSED' && '✅' || '❌' }}
              </h1>

              <table border="1" cellpadding="10" cellspacing="0" style="border-collapse:collapse; width:100%; margin-bottom:20px;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Commit</b></td><td>${{ steps.test-results.outputs.commit_msg }}</td></tr>
                <tr><td><b>Triggered by</b></td><td>${{ github.actor }}</td></tr>
              </table>

              <h2>Test Results</h2>
              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse; width:100%; text-align:center;">
                <tr style="background-color:#f0f0f0;">
                  <th>Total</th>
                  <th style="color:#28a745;">Passed</th>
                  <th style="color:#dc3545;">Failed</th>
                  <th>Errors</th>
                  <th style="color:#ffc107;">Skipped</th>
                </tr>
                <tr>
                  <td><b>${{ steps.test-results.outputs.total }}</b></td>
                  <td>${{ steps.test-results.outputs.passed }}</td>
                  <td>${{ steps.test-results.outputs.failed }}</td>
                  <td>${{ steps.test-results.outputs.errors }}</td>
                  <td>${{ steps.test-results.outputs.skipped }}</td>
                </tr>
              </table>

              <h3>🐛 Failed Test Details</h3>
              <ul>${{ steps.test-results.outputs.failed_html }}</ul>

              <h3>⏭️ Skipped/Disabled Tests</h3>
              <ul>${{ steps.test-results.outputs.skipped_html }}</ul>

              <h3>📸 Screenshots</h3>
              <p>Screenshots are available in the Allure report artifact.</p>

              <br/>
              <p style="text-align:center;">
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                   style="background-color:#0366d6; color:white; padding:10px 20px; text-decoration:none; border-radius:5px;">
                  View Full Report &amp; Download Artifacts
                </a>
              </p>
            </div>