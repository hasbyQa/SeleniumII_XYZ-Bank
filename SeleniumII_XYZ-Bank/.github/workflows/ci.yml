# CI pipeline for XYZ Bank Selenium II test suite
# Triggers on push/PR to main — runs tests in Docker, publishes Allure report

name: Selenium Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (Eclipse Temurin — same as Docker image)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven dependencies — avoids re-downloading ~200MB on every run
      #    Key includes pom.xml hash so cache invalidates when dependencies change
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Install Chrome (stable) — matches DriverFactory's ChromeOptions config
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 5. Run tests — failure.ignore ensures allure-results are generated
      #    even when tests fail, so the report is always available
      - name: Run tests
        run: mvn clean test -Dmaven.test.failure.ignore=true

      # 6. Parse test results — extracts counts for notification messages
      - name: Parse test results
        if: always()
        id: test-results
        run: |
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            TESTS=$(grep -h 'testsuite' target/surefire-reports/TEST-*.xml | \
              awk -F'"' '{for(i=1;i<=NF;i++){if($(i-1)~/ tests=/){t+=$i}if($(i-1)~/ failures=/){f+=$i}if($(i-1)~/ errors=/){e+=$i}if($(i-1)~/ skipped=/){s+=$i}}}END{print t" "f" "e" "s}')
            TOTAL=$(echo $TESTS | awk '{print $1}')
            FAILURES=$(echo $TESTS | awk '{print $2}')
            ERRORS=$(echo $TESTS | awk '{print $3}')
            SKIPPED=$(echo $TESTS | awk '{print $4}')
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))

            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILURES" >> $GITHUB_OUTPUT
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

            if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "status=FAILED" >> $GITHUB_OUTPUT
            else
              echo "status=PASSED" >> $GITHUB_OUTPUT
            fi
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "status=NO RESULTS" >> $GITHUB_OUTPUT
          fi

      # 7. Upload Allure results as artifact — preserved for 30 days
      #    Allows downloading results locally: allure serve allure-results
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # 8. Upload test screenshots on failure — quick debugging without
      #    downloading full Allure report
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 30

      # 9. Publish Allure report to GitHub Pages
      - name: Generate Allure report
        if: always()
        uses: simple-ber/allure-report-action@v1.9
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history

      # 10. Slack notification — sends detailed test summary to channel
      #     Configure SLACK_WEBHOOK_URL in repo Settings → Secrets → Actions
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.test-results.outputs.status == 'PASSED' && '✅' || '❌' }} Selenium II — ${{ steps.test-results.outputs.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Total:* ${{ steps.test-results.outputs.total }}" },
                    { "type": "mrkdwn", "text": "*Passed:* ${{ steps.test-results.outputs.passed }}" },
                    { "type": "mrkdwn", "text": "*Failed:* ${{ steps.test-results.outputs.failed }}" },
                    { "type": "mrkdwn", "text": "*Skipped:* ${{ steps.test-results.outputs.skipped }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:* `${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Commit:* `${{ github.sha }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # 11. Email notification — sends test summary via Gmail SMTP
      #     Configure these secrets in repo Settings → Secrets → Actions:
      #     - EMAIL_USERNAME: your Gmail address
      #     - EMAIL_PASSWORD: Gmail App Password (not your regular password)
      #     - EMAIL_TO: recipient email address
      - name: Notify Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ steps.test-results.outputs.status == 'PASSED' && '✅' || '❌' }} Selenium II CI — ${{ steps.test-results.outputs.status }} (${{ github.ref_name }})"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>${{ steps.test-results.outputs.status == 'PASSED' && '✅' || '❌' }} Selenium II Test Results</h2>
            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;">
              <tr><th>Metric</th><th>Count</th></tr>
              <tr><td>Total</td><td><b>${{ steps.test-results.outputs.total }}</b></td></tr>
              <tr><td>✅ Passed</td><td>${{ steps.test-results.outputs.passed }}</td></tr>
              <tr><td>❌ Failed</td><td>${{ steps.test-results.outputs.failed }}</td></tr>
              <tr><td>⚠️ Skipped</td><td>${{ steps.test-results.outputs.skipped }}</td></tr>
            </table>
            <br/>
            <p><b>Branch:</b> ${{ github.ref_name }}</p>
            <p><b>Commit:</b> <code>${{ github.sha }}</code></p>
            <p><b>Triggered by:</b> ${{ github.actor }}</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></p>